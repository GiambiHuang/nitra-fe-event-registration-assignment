nodeLinker: node-modules

# vue-flow-layout is only pulled in transitively by unocss's optional
# dev-inspector UI (@unocss/inspector), which this project never runs. It
# declares vue as a required peer but doesn't actually need it satisfied at
# install time for that use case -- marking it optional silences an
# unfixable-from-here peer warning without installing anything extra.
packageExtensions:
  "vue-flow-layout@*":
    peerDependenciesMeta:
      vue:
        optional: true
